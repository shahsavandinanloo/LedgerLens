<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LedgerLens Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
    <style>
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #007aff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-screen"><div class="spinner"></div><p style="font-family: sans-serif; margin-top: 15px; font-size: 14px; color: #555;">در حال بارگذاری موتور هوشمند پایتون...</p></div>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
        stlite.mount({
            requirements: ["pandas", "plotly", "openpyxl"], // حذف pyarrow برای سرعت بیشتر
            files: {
                "logic.py": `
import pandas as pd
import streamlit as st

def clean_data(file):
    try:
        df = pd.read_excel(file, header=3)
        cols = df.columns.tolist()
        c_date, c_inc, c_exp, c_desc = cols0, cols2, cols3, cols4
        df = df.dropna(subset=[c_date])
        df[c_date] = df[c_date].apply(lambda x: str(x).split()0.replace('-', '/'))
        for c in [c_inc, c_exp]:
            df[c] = df[c].apply(lambda x: int(str(x).replace(',', '').strip()) if pd.notna(x) and str(x) != '-' else 0)
        tags = df[c_desc].str.strip("/").str.split("/", expand=True).iloc[:, :5]
        tags.columns = ["Nature", "Center", "Class", "Detail", "Extra"]
        df = pd.concat([df, tags.fillna("-")], axis=1)
        df["_D"], df["_I"], df["_E"] = df[c_date], df[c_inc], df[c_exp]
        return df.sort_values("_D")
    except Exception as e:
        st.error(f"Error: {e}")
        return None
`,
                "app.py": `
import streamlit as st
import pandas as pd
import plotly.express as px
from logic import clean_data

st.set_page_config(page_title="LedgerLens", layout="wide")
st.markdown("<style>@import url('https://v1.fontapi.ir/css/Vazir'); * { direction: rtl; font-family: 'Vazir', sans-serif; }</style>", unsafe_allow_html=True)

# مخفی کردن لودینگ
st.components.v1.html("<img src='x' onerror='window.parent.document.getElementById(\\"loading-screen\\").style.display=\\"none\\"'>", height=0)

st.title("💎 LedgerLens AI")

f = st.file_uploader("", type=['xlsx'])
if f:
    df = clean_data(f)
    if df is not None:
        ti, te = df["_I"].sum(), df["_E"].sum()
        st.success(f"درآمد: {ti:,.0f} | هزینه: {te:,.0f}")
        exp_df = df[df["_E"] > 0]
        if not exp_df.empty:
            summary = exp_df.groupby("Class")["_E"].sum().reset_index()
            # رسم نمودار با لیست ساده برای جلوگیری از کراش
            fig = px.pie(names=summary["Class"].tolist(), values=summary["_E"].tolist(), hole=0.4)
            st.plotly_chart(fig, use_container_width=True)
        st.dataframe(df[["_D", "Class", "Detail", "_I", "_E"]].style.format("{:,.0f}"), use_container_width=True)
`
            },
            entrypoint: "app.py"
        }, document.getElementById("root"));
    </script>
</body>
</html>
