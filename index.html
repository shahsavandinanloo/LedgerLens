<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LedgerLens AI Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
        stlite.mount({
            requirements: ["pandas", "plotly", "openpyxl"], 
            files: {
                "logic.py": `
import pandas as pd
import streamlit as st

def clean_data(file):
    # تعریف نام ستون‌ها در متغیر برای جلوگیری از خطای Syntax
    COL_DATE = 'تاریخ'
    COL_DESC = 'توضیحات کاربر'
    COL_INC = 'واریز (ریال)'
    COL_EXP = 'برداشت (ریال)'
    
    try:
        df = pd.read_excel(file, header=3)
        df = df.dropna(subset=[COL_DATE], how='all')
        
        # نرمال سازی تاریخ - جدا شده برای امنیت بیشتر
        def fix_date(x):
            s = str(x).split(' ')0
            return s.replace('-', '/')
        
        df[COL_DATE] = df[COL_DATE].apply(fix_date)
        
        # تمیز کردن مبالغ
        for c in [COL_INC, COL_EXP]:
            df[c] = df[c].apply(lambda x: int(str(x).replace(',', '').strip()) if pd.notna(x) and str(x) != '-' else 0)
        
        # شکستن تگ ها
        tags = df[COL_DESC].str.strip('/').str.split('/', expand=True).iloc[:, :5]
        tags.columns = ['ماهیت', 'مرکز', 'کلاس', 'جزئیات', 'تکمیلی']
        df = pd.concat([df, tags.fillna('-')], axis=1)
        
        df['مرکز'] = df['مرکز'].str.strip()
        return df.sort_values(COL_DATE)
    except Exception as e:
        st.error(f"Error: {e}")
        return None

def get_insights(df):
    """نوآوری: محاسبه نرخ پس‌انداز و پیش‌بینی"""
    inc = df['واریز (ریال)'].sum()
    exp = df['برداشت (ریال)'].sum()
    balance = inc - exp
    rate = (balance / inc * 100) if inc > 0 else 0
    return inc, exp, balance, rate
`,
                "app.py": `
import streamlit as st
import pandas as pd
import plotly.express as px
from logic import clean_data, get_insights

st.set_page_config(page_title="LedgerLens", layout="wide")

# استایل اختصاصی
st.markdown("""
<style>
    @import url('https://v1.fontapi.ir/css/Vazir');
    * { direction: rtl; font-family: 'Vazir', sans-serif; }
    .kpi-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; border-right: 5px solid #0068c9; }
</style>
""", unsafe_allow_html=True)

st.title("💎 LedgerLens Pro")

f = st.file_uploader("📂 بارگذاری اکسل", type=['xlsx'])

if f:
    df = clean_data(f)
    if df is not None:
        inc, exp, bal, rate = get_insights(df)
        
        # نمایش KPI ها
        c1, c2, c3 = st.columns(3)
        with c1: st.markdown(f'<div class="kpi-box" style="border-color:#2ecc71;">درآمد<br><b>{inc:,.0f}</b></div>', unsafe_allow_html=True)
        with c2: st.markdown(f'<div class="kpi-box" style="border-color:#e74c3c;">هزینه<br><b>{exp:,.0f}</b></div>', unsafe_allow_html=True)
        with c3: st.markdown(f'<div class="kpi-card kpi-box" style="border-color:#3498db;">تراز<br><b>{bal:,.0f}</b></div>', unsafe_allow_html=True)
        
        st.divider()
        
        # نوآوری: بخش تحلیل هوشمند
        st.subheader("💡 بینش هوشمند")
        if rate > 20:
            st.success(f"وضعیت عالی! نرخ پس‌انداز شما {rate:.1f}% است.")
        else:
            st.warning(f"هشدار: نرخ پس‌انداز شما {rate:.1f}% است. مخارج را مدیریت کنید.")

        # نمودارها و تب ها
        t1, t2 = st.tabs(["📊 نمودارها", "📋 لیست"])
        with t1:
            fig = px.pie(df, names='مرکز', values='برداشت (ریال)', hole=0.4, title="توزیع مخارج")
            st.plotly_chart(fig, use_container_width=True)
        with t2:
            st.dataframe(df.style.format("{:,.0f}"), use_container_width=True)
else:
    st.info("حاجی فایل رو آپلود کن.")
`
            },
            entrypoint: "app.py"
        }, document.getElementById("root"));
    </script>
</body>
</html>
